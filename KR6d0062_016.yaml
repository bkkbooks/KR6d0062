body:
  text: 天台沙門法照止觀二燈炷摩訶般若經燈炷深奧品海字函十九卷須菩提白佛言菩薩用初心得菩提用後心得菩提是初心不至後心後心不在初心如是心心數法不俱云何善根增益若善根不增云何當得菩提佛告須菩提我當為說譬喻智者得譬喻則於義易解須菩提譬如然燈為初焰焦炷為用後焰焦炷須菩提言非初焰焦炷亦非離初焰非後焰焦炷亦非離後焰須菩提於汝意云何炷為焦否世尊炷實焦佛告須菩提菩薩如是不用初心得菩提亦不離初心得菩提不用後心得菩提亦不離後心得菩提而得菩提須菩提是中菩薩初從發意行般若波羅蜜具足十地得阿耨菩提須菩提白佛言何等是十地佛言具足乾慧地性地八人地見地薄地離欲地已作地支佛地菩薩地佛地具足是十地得菩提大論表字函七十五卷非初不離初非後不離後燈譬菩薩道炷喻無明等煩惱𦦨如初地相應智慧乃至金剛三昧相應智慧輔行一下卅三大品須菩提問佛為用初心得菩提為用後心得菩提論七十五釋云須菩提何故作此問耶答須菩提聞上諸法不增不減心自生疑若法不增減云何得菩提唯佛能爾何關菩薩佛以深因緣答謂不但初心不離初心所以者何若但初心菩薩初心便應是佛若無初心云何得有第二三心後以初為本初以後為期佛以現喻喻此初後譬如焦炷非初不離初非後不離後燈喻菩提道炷喻無明焰如初地相應智慧乃至金剛三昧相應智慧焦無明惑非初智不離初智非後智不離後智論通三教故約斷位四念處二二大論明燈炷云乾慧為初𦦨佛地為後𦦨此即通家名乾慧非斷道而為初𦦨者乃是論主申含容別外人作此解乃以相似燈炷為𦦨耳云云復有人言歡喜為初𦦨佛地為後𦦨此約別教斷道為初𦦨別家初地見常住理斷無明見中道名歡喜是初𦦨復有人言初住為初𦦨佛地為後𦦨是圓教意初住見中性圓斷一品無明故初住為初𦦨此是通教通別通圓之義四教義三七故大智度論釋燈炷品云有人言乾慧地初𦦨佛地為後𦦨有人言歡喜地為初𦦨佛地為後𦦨有人言初發心為𦦨佛地為後𦦨如此解釋不同者恐是諸大乘論師釋滿字教門三教明位不同各取此意以釋初後焰妙玄四卅一問大論三處明初𦦨約別圓皆取發真為初焰通教何意取乾慧為初焰答別圓各逗一種根性故用發真為初𦦨通教為逗多種根性所謂別圓入通故含容取乾慧耳若鈍者八人見地是初𦦨利者於乾慧即能斷結故是初𦦨問利人應無十地答備有以根利故故不制位問別圓無利人耶答雖有利鈍以根性純故但作一說宜如此也釋籤五二十大論三處明焦炷等者謂乾慧地初地初住大論四十八明四十二字門即初住已上也第四十九明菩薩初歡喜地乃至法雲地廣明修治地業續此文後即云復次地有二種一者但菩薩地二者共菩薩地所謂乾慧地乃至佛地故知三教明矣故知此中問意與止觀稍自有殊此以三教為問見地焦炷置而不論若得此意則止觀宛然自別次問利人應無十地者問意利人既於初地斷見應二地乃至四地斷思六七地成佛是則無十地耶答意者教門具有於利人不制秖如超果得阿羅漢可令餘三果亦無人耶次問意者別圓若有利人應在地前住前焦炷耶答意者雖有利鈍斷位必定止觀六七問三乘共斷其義已顯用何為據更獨開菩薩地耶答大論判三處焦炷則有三種菩薩斷惑乾慧是伏惑尚得為初𦦨今取八人真斷為初𦦨有何不可輔行六上八次問者三乘共位借義已成別立菩薩恐無誠證次答意者初引大論三處焦炷者意引乾慧別在菩薩斷惑之位若共二乘不名初𦦨初𦦨即是斷位故也論別立菩薩故以初地而為斷位故大論七十八燈炷品云十地有二一菩薩初地為初𦦨二聲聞見地為初𦦨若獨菩薩地即歡喜地為初𦦨論文既以菩薩初地而為初𦦨故今取之以為況釋於共伏道尚得以為菩薩初𦦨今但退取共斷位者為獨菩薩初𦦨有何不可故知此文別判通教菩薩位也下文自有獨菩薩位即別菩薩位也所言三種菩薩者即共地菩薩中根之人亦同二乘三四地斷四念處云此是通教通別通圓義者此與藉通開導不同文中因小大半滿分門通是滿字摩訶衍門多所含容故標列云即開為三一通二別三圓至引論三處焦炷各釋結竟乃總結大科云此是通教通別通圓之義若妙玄所謂別圓入通之文答中標云通教為逗多種根性即釋云所謂別圓入通則知此句自出通教根性多種耳故含容取乾慧之句方是定初地焦炷也非謂乾慧初𦦨是別圓入通之人六即止觀一草四若智信具足聞一念即是信故不謗智故不懼初後皆是若無信高推聖境非己智分若無智起增上慢謂已均佛初後俱非為此事故須知六即云云理即者一念心即如來藏理如故即空藏故即假理故即中三智一心中具不可思議輔行一下卅三若智信下釋意也信初心具不謗言無智極方滿不懼無分則初後俱是謂極在佛凡夫永無名為後非謂凡有理理即是佛名為初非離初後非須知六即初心雖即但名為理故離初非極果雖遙即故有分故離後非此六即義起自一家深符圓旨永無衆過暗禪者多增上慢文字者推功上人並由不曉六而復即云云初釋理即約如來藏理釋三諦者一切衆生具如來藏三諦無缺妙宗上十三六種即名皆是事理體不二義而事有逆順名字等五是順修事唯理性一純逆修事此逆順事與本覺理體皆不二其逆順名自何而立以知不二事皆合理名之為順其不知者事皆違理故名為逆名字等五若淺若深皆知皆順若初理即唯迷唯逆而迷逆事與其覺理未始暫乖故名即佛所以者何良由衆生性具善惡不可變異其性圓明名之為佛性染性惡全體起作修善修惡更無別體全修是性故得迷事無非理佛指要上一家所判法門名義無間高下己他無不理性本具全性起修分顯究盡故今十門一一如是皆為觀體其義更明云云雜編一十一引止觀大意云理同故即事異故六凡諸經中有即名者如生死即涅槃之流皆以六位甄之使始終理同而初後無濫今謂理同者三千空中之理迷悟咸同也事異者三千即假之事因果有異也理雖具假由未緣起故對事邊同名空中亦可得云對事方合據理常開是則事為能即理為所即所即如空無高下能即如飛者淺深涅槃疏一十六一切衆生皆有佛性而無見用即無分佛初地初住能百界作佛即少分佛二住二地是多分佛妙覺是滿分佛以是義故一一法門皆有權實本迹即此義也問蛣𧏙蝮蠆義復云何答夫一善法即有四分例一惡法亦應如是未見明教置而不論且就權者言之小菩薩所作是無分蝮蠆初地初住所作是少分乃至十住十地等所作是多分如來所作是滿分妙宗上十三又復應知六即之義不專在佛一切假實三乘人天下至蛣蜣地獄色心皆須六即辨其初後所謂理蛣蜣名字乃至究竟蛣𧏙今釋教主故就佛辨以論十界皆理性故無非法界一一不改故名字去不唯顯佛九亦同彰至於果成十皆究竟故蛣𧏙等皆名六即止觀五八問十法界互相有為因為果答俱相有而果隔難顯因通易知云云更引諸例凡聖皆具五陰不可言聖陰如凡陰又佛具五眼豈可以人天果報釋佛眼輔行五上草二次問者為是一一因心具十界因為復一一界果具十界果答中初總答云俱相有者法爾而然一念因心道理具十一界之果豈當一界然言一果具於十果果既隔越遍顯似難若知隨起十中一心一必通十是則一果具十因一因具十因故曰因通理則易知云云更引下略明果隔示難顯相從事理說即十界果各具十果故云凡聖皆具五陰云云言不可者意說凡陰不同聖陰又佛具下舉一佛果具於十界然不可以聖陰同凡自是佛果能具十界終不可以佛地獄界以為凡夫地獄界也佛果已滿從事而說已具十界初地初住分具十界乃至凡夫但是理具是則一一界果各各具十不相混濫一往從易且云因通及以果隔理而言之一念因心實具十界百界因果云云問一心既具但觀於心何須觀具答一家觀門永異諸說該攝一切十方三世若凡若聖一切因果者良由觀具具即是假假即空中理性雖具若不觀之但言觀心則不稱理小乘奚嘗不觀心耶但迷一心具諸法耳妙記十十一唯圓即觀一念三千三諦具足是則一心一切心一身一切身一土一切土一念俱觀若身心土若空假中更無前後故觀成時一心見一切心一身見一切身一土見一切土十方諸佛身中現故故於自心常寂光中遍見十方一切身土若唯觀他遮那之土必迷自境若了心境自即他故他即自故不了此境自尚成他況觀心耶觀土既爾身佛心然句十七解謗十一蛣𧏙名相至究竟者此明理性具十界也既皆性具性必常住十皆法界法界無外界界遍收法法高廣博地但理名字初聞五品觀成六根似發四十一位分真體用不二妙覺等性究竟法應圓融故蛣𧏙等若假若實與佛假實一一無非常樂我淨即無上衆生無上五陰既皆四德復稱無上豈一人一法非尊特耶故三千果成咸稱常樂名義彰灼學者自迷雜編一十二夫六即之名本為揀濫雖一切法通於六位若名有叨濫者故須甄之若名不叨濫不必揀也云云且蛣𧏙蝮蠆者畜趣之微物也俱是迷逆之號故無叨濫之理何必須用六即甄分良為他人見涅槃疏中明蛣𧏙蝮蠆有於四分例彼四分立此六即而不知蟲名雖等分之與即二義敻殊何者彼之四分既名為作蓋約權造事用而言此之六位既名為即須從實證理體而說圓談法性須具三千三諦之法則十界實法十界假名始從理即終至究竟位位無減既以三千該乎六即豈非蛣𧏙假實通六即耶故修觀者圓觀諸法即空假中以至果成一成一切成十界俱成則不遺蛣𧏙矣講者謂至究竟位但有十界之性永無蛣𧏙之事只緣不合作畜生界蛣𧏙說了便有轉報不轉報之說四種三昧文殊說般若經翻字函第一卷文殊言世尊云何名一行三昧佛言法界一相繫緣法界是名一行三昧文殊問經墨字函下卷於九十日修無我想不離思惟除食及經行大小便時悉不得起止觀二三一常坐者出文殊說文殊問兩般若名為一行三昧云云方法者身論開遮口論說默意論止觀云云九十日為一期云云但專繫緣法界一念法界云云二常行三昧云云此法出般舟三昧經翻為佛立佛立三義一佛威力二三昧力三行者本功德力能於定中見十方現在佛在其前立如明眼人清夜觀星云云三半行半坐云云此出二經方等云旋百二十匝却坐思惟法華云其人若行若立讀誦是經若坐思惟是經我乘六牙白象現其人前云云四非行非坐三昧者上一向用行坐此既異上為成四句故名非行非坐實通行坐及一切事而南嶽師呼為隨自意意起即修三昧大品稱覺意三昧云云就此為四一約諸經二約諸善三約諸惡四約諸無記諸經行法上三不攝者屬隨自意也輔行二上一言一行者剪略身儀不兼餘事名為一行非所緣理得一行名若所緣理名一行者四行莫不皆緣實相云云經部雖即義通三乘今意在圓不通通別云云以彼二經是般若部云云由此觀故見色身佛雖非本期觀力使爾云云次釋常行云云部屬方等機通四人二乘被斥非文正意故四教菩薩亦通行之今意在圓故意止觀寄色身佛以成三觀云云見相好身身出光明遍十方界如融金聚如須彌山在大海中日照發明云云光明記四二今家依二經明常坐三昧一文殊說般若二文殊問菩提文殊問經上般若波羅蜜品第六爾時文殊師利白佛言世尊般若波羅蜜一切聲聞緣覺從般若波羅蜜出不一切佛一切法從般若波羅蜜出不佛告文殊師利如是如是云云世間戒品第十爾時文殊師利白佛言世尊云何歸依佛告文殊師利歸依者應如是言大德我某甲乃至菩提歸依佛乃至菩提歸依法乃至菩提歸依僧云云次言大德我持菩薩戒我某甲乃至菩提不殺生離殺生想乃至菩提不盜亦離盜想云云止觀九一文殊問菩提經禪定有三十六垢垢即是障輔行九上一文殊問經三十六垢未檢文中兩般若者一文殊師利說摩訶般若波羅蜜多經明行相二文殊師利問經明要制是知行相要制兩經相成也然文殊問經雖無菩提之目以文中有般若品故大師云出兩般若又世間戒品云發誓至菩提等故四明云文殊問菩提經然四明亦本止觀禪境中云文殊問菩提經禪定有三十六垢即文殊問經若文殊問菩提經無九十日與三十六垢文也事理二觀占察善惡業報經墨字函下卷唯心識觀者所謂於一切時一切處隨身口意所有作業悉當觀察知唯是心云云若學習真如實觀者思惟心姓無生無滅不住見聞覺知永離一切分別之想云云廣如類集觀法中止觀二十一初明四運者夫心識無形不可見約四相分別謂未念欲念念念已未念名心未起欲念名心欲起念名正緣境住念已名緣境謝若能了達此四即入一相無相問未念未起已念已謝此二皆無心無心則無相云何可觀答未念雖未起非畢竟無如人未作作後更作作不可以未作作故便言無人若定無後人誰作作云云念已雖滅亦可觀察如人作竟不得言無若定無人前誰作作念已心滅亦復如是輔行二下一又觀四運者是隨自意中從末從事而修觀法如常坐等或唯觀理謂一切法無非法性是故當知修三昧者於此二途一不可廢故占察經觀有二種一者唯識謂一切唯心二者實觀謂觀真如唯識歷事真如觀理今文觀於十界四運義當占察一切唯心云云故傅大士獨自詩云獨自作問我心中何所著巡檢四運併無生千端萬緒何能縛當知無垢大士亦以四運而為心要大士雖即不云十界既云萬緒意亦兼諸云云義例釋疑例十三問夫觀心法有事有理云云十九故東陽大士位居等覺尚以三觀四運而為心要故獨自詩云獨自精其實離聲名三觀一心融萬品荊棘叢林何處生獨自作問我心中何所著云云況復三觀本宗瓔珞補處大士金口親承故知一家教門遠稟佛經復與大士宛如符契十義書一止觀四種三昧不出二觀唯識歷事實相觀理云云三實相觀理者則於陰心唯觀理具三千實相也唯識歷事專照起心歷於能造十界之心也云云又須知事理不二之語得意之者隨修一觀必含二義如修理觀者雖云但觀理具須知全修在性則善修實相觀也修事觀者雖觀能造十界之心須知全性成修則善修唯識觀也云云四事理二造既其不分事理二觀因何而起指要上三實相觀者即於識心體其本寂三千宛然即空假中唯識觀者照於起心變造十界即空假中故義例云夫觀心法有理有事從理則唯達法性更不餘途從事則專照起心四性叵得亦名本末相映事理不二又應知觀於內心二觀既爾觀於外境二觀亦然此皆止觀及輔行文意非從臆說顯性録一十三一者唯心識觀謂於外諸境界知唯是心二者真如實觀謂觀心性無生無滅真如觀理唯識歷事理事相即二觀互收一實境界即一心三千三諦也真如觀即內心若淨也唯識觀即遍歷諸法也故真如觀成得心寂三昧唯識觀成得色寂三昧圓通記上三須知觀察知唯是心則於色界及諸外境不起分別所以經云色寂三昧非謂外觀專觀外色真如實觀思惟心性不生不滅以能超過無色四空心及心所二俱寂滅是故經云心寂三昧非謂理觀專觀內心雜編一若約起心論具即是修具乃是唯識觀境若約不起心論具乃真如觀境輔行云理具變為修具一一修具無非理具文心解八三千色心同居一念念無念相三諦現前當知觀外三千亦見心性空中之理觀內心性亦見三千即假之事故義例云本末相映事理不二輔行云修三昧者於此二途一不可廢云云初陰入界或唯觀理下之九境隨發而觀多是歷事云云義例云修觀次第必先內心云云以此淨心歷一切法任運㳷合若爾外觀必須內心淨後方可修耶此有二意一者如義例所示即不思議境後歷一切法是也二者自有內心未淨復修外觀如破法遍末歷餘陰入是也故文云若總無明心未必是宜更歷餘心等云云纂要五四事理二觀其實通於四種三昧何者常坐十乘中第一理觀一念三千非一異等豈可不是實相理觀次修德境四性推檢豈可不是唯識歷事云云第四三昧輔行釋歷諸善中云念念稱理無橫計思後方覺了故引起信文豈非理觀唯達法性更指何耶事理二觀之名出自荊溪依占察經發明此義義例問答甚是分明但說者多暗須究問意或云諸法即是法性或云四運四性推檢則知或云諸法即是法性此問理也或云四運四性推檢此問事也答云從理則唯達法性更無餘途此答理也從事則專照起心四性叵得此答事也不言四運固可知矣指要鈔十義書準此或問不思議境推四性何也曰此不思議四句乃寄起明相任運離四性計若推四性則墮事中矣余嘗斷曰不思議境只可通貫事理不可分對事理三止名止觀三七一體真止二方便隨緣止三息二邊分別止云云此三止名雖未見經論映望三觀隨義立名釋論云菩薩依隨經教為作名字名為法施立名無咎若能尋經得名即懸合此義也詳此三止與前釋名名倣佛同其相則異輔行三上十六此三止名等者釋疑此是大師謙退之辭次釋論下證三止意何但映望三觀使名有憑大論亦許隨義立名言依三觀立三止者大小乘經止觀二名皆悉並立況止觀秪是定慧異名既定慧之名處處並列故今望觀以立止名所以瓔珞三觀義必兼止首楞嚴經染字函第一卷恨無始來一向多聞未全道力殷勤啓請十方如來得成菩提妙奢摩他三摩禪那孤山云涅槃明三一奢摩他此云止二毗鉢舍那此云觀三優畢叉此云止觀等今阿難雖專請於止以即一而三故此止即觀亦即平等三一互融是以稱妙妙故方曰楞嚴大定今於此止復有三名奢摩他即體真止止即真諦三摩提亦摩他此云等持即方便隨緣止止即俗諦禪那此云靜慮即息二邊分別止止於中觀第一義諦霅川集解一五孤山專用天台三止配今三名者斯又得經之深也何則止屬於定觀屬於慧阿難既以多聞少慧自欲正以楞嚴大定為請大定非三止而何況三摩禪那顯是止名則知天台三止冥符聖言矣止觀三五而諸經赴緣偏舉一法以示義端如首楞嚴偏舉止邊止具一切法不減少云云智度法華偏舉觀邊觀具一切法不減少圓覺經下此方便者名奢摩他云云名三摩鉢提云云名為禪那問大經圓覺名字與楞嚴同大師既見涅槃何云映望而立曰孤山謂圓覺明三觀大經初止次觀三止觀平等而楞嚴唯明三止也含中止觀三十八通教真諦發二眼二智俗諦發一眼一智云云若作別接通者俗諦發一眼一智真諦發一眼一智開真出中發一眼一智輔行三下八通教中云真諦共發二眼二智者含中故也次接中云開真出中者若已被接得入正道乃成三諦也釋籤三十九次釋接義者即含中入真也先達云含中時未論被接被接時必藉含中含中須就當教而說何者通教是摩訶衍門談幻有即空是故如來於此體空含中道佛性而說利鈍兩機解入有異若鈍根人聞此空法唯證但空之理利根之人聞此空法即於此空能深觀空即見不空故有但中不但中別也別教聞中止觀三草九別教止觀亦頓亦漸何以故初心知中故名亦頓涉方便入故名亦漸復次前三止觀教行證人未被會時尚不知圓何況入圓輔行三下草九解頓行漸解但知於頓理而已行必經歷恆河沙劫數故知此教初從方便故方便之言兼具二義一藉地前之方便二聞但中之方便別亦知中今言不知者前三不知圓理故也妙記四末別人初心何嘗不達三諦之理云云至十行位分明見假至回向位觀無一異若入初地方順法流光明記一八此教初心便聞但中中雖不具九界依正非無界佛妙色妙心金錍云別人初心教權理實以教權故所稟未周輔行三下卅四別帶方便雖初聞實從教成權妙宗上草六別人初心信今知覺本是常住中道佛性從教道故名為但中北峰師曰應知中道佛性是真實之理非權理也別人初心既聞中知中即是實理但其根鈍迷中重故未得即修須藉方便次第而入是故如來說此中理在於果上出空假外成乎但中此由機鈍教權故也初心既聞此中無更別聞是則約所聞中理是實從教門說之成權約知中理是實故亦頓涉方便入中居邊外故亦漸所以輔行釋方便兼具二義一藉先修空假二藉聞中離邊約中離邊則當方便亦漸句收約中實理則當知中亦頓句收故云教權故但理實故中也
