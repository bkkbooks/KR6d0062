body:
  text: 天台沙門法照普門子序普門子序私科為三初四教下歎教在人二惟三下傳弘著述三普下謙己記時著述又二初廣敘傳弘二間者下的美著述又二初著述之艱二且法下籤訪之美章疏題淨名玄一此經理致深遠言旨淵玄若但依文帖釋恐止事數而已一教宗極終自難量猶須略忖幽微顯不思議旨趣今輒於文前撰五重玄義籤一二玄悟法華圓意者五義釋經統收五味故名為玄玅記八廿九略舉經題玄收一部玅宗上二五重玄義本是經中所詮觀法大師預取解釋經題別行玄記上一言玄義者能釋之義門也玄者幽微難見之稱義者深有所以也斯葢大師以三昧力徹法性際深見今品人法之意也應知名等五義皆悉幽微七方便人智莫能見光明句記二二十玄義者文選云睿哲玄覽注云玄通也謂離文通示其義故曰玄義玄之一字四明玅宗別行記約所釋得名與淨名玄同光明記約能釋得名與荊溪合然準妙宗之文則覽所釋為能釋也文句二字當亦然故妙樂云文謂文字一部始終句謂句逗義通長短則一部文字始終句逗指經明矣光明記踵此說但就能釋而言謙辭耳問諸部題名曰玄義曰文句曰疏者何曰精微云疏是通名玄句是別目如妙玄文句等從別單題若淨名玄疏別行義疏等乃通別雙題或單從通名則觀經疏等是也指歸鈔一一云一家言教解題與釋文各部者則名有玄義文句之異其合為一部者則總題曰疏如淨名疏觀經疏之例也文涅槃稱疏此乃新意非舊題名問法華疏題名文句與教體三假文身句身同異云何北峰師曰體相是同用與少異同稱文句屬三假中二體相同也故妙樂釋文句二字牒唯識文而例同之用與異者此是題名彼是教體一不同也題屬一經彼通諸教二不同也題就色立教體通聲三不同也問妙樂云此亦不論色行等體亦之一字對何文下耶曰唯識云文即是字句詮差別俱舍云牟尼說法蘊數有八十千彼體語或名是色行蘊攝今題云文句非但不可唯識一實三假亦不同於俱舍攝色行體也編次玄句疏于後解題法華玄義釋文法華文句題文觀經疏光明玄義光明文句觀音玄義觀音義疏三請觀音疏淨名玄義淨名疏涅槃玄涅槃疏菩薩戒疏光明記一一文句者文即經文句謂章句亦句逗也即以章句節其經文令其詮旨各有分齊故荊溪云以由釋題大義委悉故至經文但粗分章段題云文句良由於此然立此二字葢謙辭耳若觀釋經大義非少新記云文句二字是經文經句大師消文節句攬所釋為能釋玄文四序北峰曰玄文四序一總序既是章安私記緣起理合居初二序王大師將釋五重玄義先以一序序經首題王起眾文之始三私序王大師雖序經始末且從其義章安從說故復重釋四玄文本序正序玄文此四序安布次第也竊詳章安總序與私序王則大師說玄時未有也大師將說五重玄義先覽五義別為序王以釋經名令知經名通冠本迹次作本序正序玄文章安私序乃因大師序王但序經題義含五章未明經文亦具五章故重作私序而釋成之惟總序緣起乃最後作也問別行經序為是談玄之序為是別時講經之序若云經序何云正序玄文若云序玄何云別行經序曰荊溪兩云正序玄文的是玄序而名經序者對玄文本序得名也荊溪因見玄文自有本序又見章安釋云葢序王者序經玄意故科此別釋經名為別行經序行訓作也問序王與本序顯釋五章之名荊溪何云似但釋名而已曰記主見大師於經字前著蕩化等語故知似但釋名爾却科蕩化為探取經旨舊云別行與本序則能釋所釋異一章五章異玄句聽次玄序云昔於建業始聽經文次在江陵奉蒙玄義玅樂一江陵稟受玄旨建業方聽經文妙樂引證一徧記難如玄序云云語雖倒置事則無殊葢作文法也近人以方訓始艸庵謂之文誤者非甘露門玄一一知甘露門之在茲籤一三實相常住如天甘露是不死之藥今釋玅法能通實相故名為門句一二今明娑婆國土音聲佛事則甘露門開記一九則甘露門開者則言乃表唯聲益故實相為甘露諸教為其門門無開閉理非通塞此土入者不假餘塵由之通理故曰門開問籤文云玅法為能通門玅樂何云諸教為其門耶曰玅樂因釋此土聲教入道故云諸教為門籤文釋經首題故云妙法為門要知開顯諸教即玅法也待絕二玅玄一一所言妙者妙名不可思議也籤一三初釋妙者但舉一不思議則已簡於可思議也彼止觀為成觀故乃以相待為可思議麤唯一絕待為不思議妙今則不爾圓中約時待絕俱妙餘味約部或妙或麤若前三教時之與部一向為麤至法華被開方稱為妙止觀相待義似於別故判為麤今此妙名兼於本迹彼文妙觀獨在於圓雖異而同細尋可了下文廣釋不俟多云輔行三上二今法華唯具二妙所謂待絕所言待者唯有待麤成妙更無待妙成麤若以迹望本亦可互形若以部望部一向唯妙今約法華迹理復置互形所以玄文待絕俱稱為妙故以部教相望復有橫豎望前四時名為豎待圓望三教名為橫待此文既依法華經意而釋名等大槩準彼相待是麤義當待麤論妙絕待是妙義當開麤論妙此二亦名廢麤開麤故法華中唯論二妙更無非待非絕之名彼為判教故待之與絕同稱為妙今此相待則判為麤唯明絕觀無部可待則無豎待無教可望名無橫待故唯一絕以為能詮雖立相待以顯絕待尚無於絕何待之有玄二十二若破麤顯妙即用上相待妙若開麤顯妙即用上絕待妙玄二九一相待二絕待此經唯論二妙更無非絕非待之文若更作者絕何惑顯何理故不更論也籤二卅一既云此經當知妙題兼此二義故使今釋諸妙以二冠初故迹門十妙一一妙中開多科目無不二釋言更無非待非絕等者理性實是非待非絕祇向待絕約理論二不同雙非二邊更有中道之理恐有人疑應更別有雙非絕待之理故便釋云文理俱無此待絕理已破無明已顯中道故知雙非無復所顯故云破何惑等玄二九今待麤妙者待半字為麤明滿字為妙亦是常無常大小相待為麤妙也淨名云說法不有亦不無以因緣故諸法生即是明滿字也始坐佛樹力降魔得甘露滅覺道成即提昔之半待出於滿也般若云於閻浮提見第二法輪轉亦是對鹿苑為第一待般若為第二也涅槃云昔於波羅柰初轉法輪今於尸城復轉法輪眾經皆共以鹿苑為半為小為麤待此明滿大妙其義是同今法華明昔於波羅柰轉四諦法輪五眾之生滅今復轉最妙無上之法輪此亦待鹿苑為麤法華為妙妙義皆同待麤亦等文義在此也云云二絕待明妙者為四一隨情三假法起若入真諦待對即絕故身子云吾聞解脫之中無有言說此三藏經中絕待意也二若隨理三假一切世間皆如幻化即事而真無有一事而非真者更待何物為不真耶望彼三藏絕還不絕即事而真乃是絕待此通教絕待也三別教若起望即真之絕還是世諦何者非大涅槃猶是生死世諦絕還有待若入別教中道待則絕矣四圓教若起說無分別法即邊而中無非佛法亡泯清淨豈更佛法待於佛法如來法界故出法界外無復有法可相形比待誰為麤形誰得妙無所可待亦無所絕不知何名強言為絕籤二卅一初文意者今家即以三教為滿故對三藏為半簡之云云所以重敘前諸經者明今經相待不應對三教文亦且同諸教所待故亦指鹿苑而為所待結中意者一往以所待之麤對圓為能待之妙云云釋絕待中為七云云初文約教顯圓問若明絕待祇應但一何故開四以四相形與待何別答若相待中展轉明妙前麤猶存今論絕待絕前諸麤無可形待又所以漸明四種絕者為知圓絕極妙無過前三被絕圓外無法細消文意各有深致云云意但且論展轉相望以明諸絕顯於圓教無復能絕云云次豈更下明絕待相狀明法界體一無復形待待誰為麤等者明無能待能即是妙法外無法待誰麤妙無所可待等者明無所絕所即是麤法外無法故無所絕云云不可以相待示不可以絕待示待絕俱絕故名滅待滅絕玄二十一用是兩妙妙上三法眾生之法亦具二妙稱之為妙佛法心法亦具二妙稱之為妙籤二卅四次二妙妙上三法者欲明三妙在於法華方得稱妙故須二妙以妙三法故諸味中雖有圓融全無二妙三被妙已故三即妙故上文云此妙即法此法即妙故得三法皆具於十成三十妙良由於此問向釋妙云待絕俱絕方名為絕今何以言待絕二耶答前明絕待故須俱絕今述經意故須雙明經意雖雙理無異趣以此俱絕對前稱待所待未會會方名絕是故此部得二妙名籤六九又若不論待無以明絕若明待已即指所待是於能絕亦絕方名為絕相待論判絕待論開即諸文判麤玅開麤玅也相待者待麤而論妙能待之義在於法華絕待者絕相待之麤妙而論妙亦絕能待之妙而論妙亦在法華舊謂相待是施權義非也蓮華三喻玄一一一為蓮故華譬為實施權文云知第一寂滅以方便力故雖示種種道其實為佛乘二華敷譬開權蓮現譬顯實文云開方便門示真實相三華落譬廢權蓮成譬立實文云正直捨方便但說無上道籤一四妙法不出權實故蓮以譬實華以喻權云云若非蓮華無以顯於妙法故也云云為蓮故華者約時且寄華嚴頓後而說頓中之別理實教權且置未論鹿苑施小方等般若已為開廢而作方便如此說者且在於小若約教者通前四時三教皆權二乘唯在法華菩薩處處得入而今文引且從引小小難引故故寄說之云云次明開者指實為權權掩於實名方便門閉今指權為實於權見實名方便門開云云第三廢者捨是廢之別名開已俱實無權可論義當於廢權轉為實所廢體亡云云若爾開廢何別答約法乃開時即廢約喻必義須先開若爾法喻差違何成喻法答據理似與喻有違據事似先開後廢如先示方便即是真實既識實已永不用權若約理者開廢俱時開時已廢故也玄一四為蓮故華華實具足可喻即實而權又華開蓮現可喻即權而實又華落蓮成蓮成亦落可喻非權非實籤一十二華實具足等者為蓮故華華掩於實為實施權實在權內體復不異故云即實而權機熟須開開彼能覆情怖近果名之為覆袥彼近謂名之為開開何所開即彼能覆又華落蓮成等者華落譬非權蓮落譬非實開已即廢時無異途開教行人理同一理故故實立已同冥三德故知三德不當權實玄七六復次為十妙故開出十麤如為蓮故華意在於蓮云云又華開蓮現譬開十麤顯十妙則無復十麤唯一大事不可思議境界乃至利益玄五十六昔權蘊實如華含蓮開權顯實如華開蓮現離此華已無別更蓮離此麤已無別更妙何須破麤往妙但開權位即顯妙位也玄一十一問華以喻權權是小乘之法則不應破於艸菴艸菴既破何得以華喻權答小乘是化佗之權是故須破今明自行之權故以華喻耳籤一廿九答小乘是化佗乃至喻耳者且約初說小隔於大是故云破以大破之故云須破自行即是體內之權故以華喻然化佗之權據佛本意並屬自行又初約施權故屬化佗今論開權故屬自行施開被緣其理不二北峰曰蓮華喻法約佛意說以喻一代施化之意如來為實施權意在於實如為蓮故華華本含蓮正喻同體但眾生權中有實華含於蓮是故開顯令知據眾生不知則不名蓮華正是開艸華為蓮華但今蓮華喻佛施化之意故不論艸華也如玄七廿六一華生必有於蓮為蓮而華蓮不可見此譬約實明權意在於實無能知者文云我意難可測無能發問者文既云意在於實而眾生不知故須開也又復須知雖喻佛意無非玅法若從所喻權法當體但空但中不能即實亦可譬麤故云昔本隱實如華含蓮又云為十妙故開出十麤如為蓮故華等即此義也詳玄籤意小乘是化佗之權正如前玄多華一果等此約在昔當分喻桃李艸華也今明自行之權故以蓮華為喻然化他之權據佛本意並屬自行此據佛意喻蓮華也又云初約施權屬化佗今論開權屬自行此又約施權喻艸華開權喻蓮華是則施權隔實如艸華故須破開權即實如蓮華故須顯今明開權即玅及以佛意故以蓮華為喻也附法觀玅玄一三觀心即聞即行起精進心故籤一九觀心者隨聞一句攝事成理不待觀境方名修觀玅玄一十一六明觀心者云云心如幻燄但有名字名之為心適言其有不見色質適言其無復起慮想不可以有無思度故故名心為妙妙心可軌稱之為法心法非因非果能如理觀即辨因果是名蓮華由一心成觀亦轉教餘心名之為經籤一卅一由一心等者研一剎那既成觀已即以此觀復觀後心後心成觀所復成能後後相續名教餘心經是被下之教故觀下惑名經四明十義書破立甚精此乃玅玄一部觀心式樣十不二門指要鈔廣此說耳法華教主玅玄一五今經體者體化他之權實即是自行之權實如垢衣內身實是長者籤一十四初文即是開丈六垢衣垢衣正是示為小乘化他權實今開即是同體權實瓔珞長者此章安師私謂經體開權之文四明玅宗立法華身是尊特佛引為誠證的示開權絕待妙故決了聲聞法是諸經之王開麤即妙妙外無麤是故得云瓔珞長者看解謗書淨覺神智皆不及也華嚴三照玅玄一六云何分別云云釋籤一十六初文五味者還約華嚴日照三譬開為五味問應還取涅槃本文何以却取華嚴文耶非但數不相當亦恐文意各別答涅槃五味轉變而祇是一乳華嚴三照不同而祇是一日今演華嚴平地之譬以對涅槃後之三味數雖不等其義宛齊又涅槃以牛譬佛乳從牛出譬佛初說大乳出已後其味轉變猶成分譬故此下文義立五味皆從牛出未若華嚴日譬於佛光譬說教日無緣慈非出而出眾機所扣非照而照故使高山幽谷平地不同同稟教光終歸等照故用兩經二義相成別行疏下十二降神母胎即示兩相記下十四問華嚴頓後方施小化譬如窮子急追不至徐語方來前頓後漸其義善成今那忽云降神母胎即示兩相答諸文所論初頓次漸葢是化儀施設之語今此所說大小雙應終歸一乘方盡鑑機始末之事如方便品思無大機念欲息化諸佛勸諭方施小乘次文却云無量劫來讚涅槃法生死永盡我常是說是故思機然後施小此等之說皆是儀式不可據此以難今文預鑑羣機原始要終度物之意也句六十九今明勝應應菩薩即盧舍那尊特身大機所扣者也劣應應小乘丈六弊衣小機所扣者也別行疏記下十四彼經預敘一代始終故立譬云猶如日出先照高山次照幽谷後照平地今家義開平地為三對於涅槃五種牛味高山大機能感頓教日光先照即有次第及不次第見佛性也若涅槃中譬從牛出乳次第五味則對一代五時教味次第相生孤山論衡記云華嚴有三照之說涅槃有五味之談華嚴既居最初涅槃仍居最後乃始終之二義也疑者曰華嚴預敘一代則是預借法華莫不以法華為所施耶當知預敘之言乃是約佛意判釋所以得云先照等也不可以化儀為妨梵王見淨玅玄一六見有淨穢釋籤一十七見淨如梵王見穢如身子淨名經上七爾時螺髻梵王語舍利弗勿作是念謂此佛土以為不淨所以者何我見釋迦牟尼佛土清淨譬如自在天宮舍利言我見此土丘陵坑坎荊棘沙礫土石諸山穢惡充滿淨名疏三十二埀裕記四四有前四種罪障者界內有為緣集障界內塵沙障界外塵沙障界外無明障而此四障障於四淨故知身子具四種障身子雖除惡有為集然由有於淨有為集不依佛慧故使於垢不能見淨是故四淨悉皆不見玅樂二廿八別譯阿含第六廣明諸梵來下第八第十一廣明諸天讚佛諸天若來並同人形第四云梵王來禮佛佛入火光三昧不能得前因往瞿伽離門喚之瞿伽離問誰喚答梵王又問佛記汝得阿那含耶答如是又問阿那含名為不來汝何以來梵王言如是之人不應與語故知一同人法還有違情而誡伽離云云既為一代請法輪主請大則大請小則小梵王為一代請法之主故在大則大在小則小所以依佛慧見土清淨也不定教玄一七雖高山頓說不動寂場而游化鹿苑雖說四諦生滅而不妨不生不滅雖為菩薩說佛境界而有二乘智斷雖五人證果不妨八萬諸天獲無生忍當知即頓而漸即漸而頓大經云或時說深或時說淺應問即遮應遮即問一時一說一念之中備有不定不同舊義專判一部味味中悉如此此乃顯露不定籤一廿一初文者此指華嚴不動不離而升而遊者此指頓後漸初不動於頓而施漸化云云雖轉四諦指鹿苑此指雖施漸化而不起於頓此二味既然諸味準此雖為菩薩指方等般若彼二時中俱有小果新得舊得如常所明雖五人證界不妨八萬諸天獲無生忍此重指漸初對般若說前文約法此中約人得果不同證法不定應引大論顯密法輪義釋此中意故大論六十五云於閻浮提見第二法輪轉初轉法輪八萬諸天得無生忍陳如得初果今轉法輪無量諸天得無生忍今轉似初轉問初轉少今轉多云何以大喻小而言似耶答諸佛有二種法輪一者顯二者密初轉聲聞見八萬及一人諸菩薩見無量阿僧祇人得二乘無量阿僧祇人得無生忍無量阿僧祇人發無上道心行六波羅蜜阿僧祇人得初地乃至十地一生補處坐道場是名為密故知初見八萬一人屬顯露攝祕密者如次明之云云次引大經證中云或時說深或時說淺等名不定者以由彼此互相知故若祕密者即如下文互不相知是故名密不定與祕並皆不出同聽異聞故名為即云云問此與方等恐畏歡喜等為有何別答不定徧前四味若直語方等但彈斥而已既以身土令物殊途正當不定云云言味味者乳中則約圓別相對以辨不定酪中教門雖無二別乃與八萬對辨不定生熟二酥三四對辨其意可見按玄籤文有二義自雖高下釋相是約部豎明次味味下結是約教橫辨或問淨名佛以一音演說法眾生隨類各得解四教義引證顯露定教四教儀引明不定教淨名記云佛以一音等是祕密義如此不同者何曰經意多含徧證無礙只一梵音演說取共相見聞之義證定教取得益不同證不定教取如來神光遮覆彼彼互不相知明祕密
