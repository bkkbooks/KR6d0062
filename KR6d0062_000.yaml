front:
  text: 記讀教自以記遺忘非謂傳乎人也嘉定初在佛隴方草創已有傳之者矣東山南湖傳之者又多晚在天竺隨講修飾於經疏重言諸師異同則刪去學者有請鋟木以正舊傳何如曰可傳乎寶祐四年春甲子天台晦巖法照法華三大部讀教記法華三大部讀教記目録妙玄時教説五章議經體論第一卷普門子序章疏題玄文四序玄句聽次甘露門待絶二妙蓮華三喻附法觀法華教主華嚴三照梵王見淨不定教第二卷祕密教十二部經通別申論開權三經通別當分跨節三法通局第三卷十二因緣七種二諦三法解源翻宗立識教證別教接俗減緣行起修遮照第四卷十身舍那支佛借別名通如佛六種性三種意生身三藏菩薩斷惑第五卷十種境界大師位次六重本迹本迹比決四佛迹因四佛成道寂光有相偏圓權實三不退第六卷教體大小乘印二空別教縱橫懺重三藏教名性相二宗乞乳第七卷提謂經六因四緣楞伽制肉雙遊華嚴教主涅槃五味通別五時方等授記十行橫學文句第八卷釋文句二字六難能開佛慧記釋委釋等科寄行約教觀心引證三寶第九卷結益三分所聞法體三疑結集法藏心王境觀第十卷聲聞無生鏡體半頭天眼第十一卷傳衣別教房宿三種佛界三界天主無量義經四伏難方便品題五濁體相第十二卷知法常無性佛種從緣起索車身子六心退四種緣集五人得菩提第十三卷齊探上下五分結無住本性類二種第十四卷舍利法華分身三變土田龍女成佛壽量四句品信開合六根盈縮文殊位次止觀止觀懸敘綱領定境説不思議境第十五卷祖承鶴林傳觀無情佛性置毒起教觀第十六卷燈炷六即四種三昧事理二觀三止名含中別教聞中第十七卷戒體別教修中所觀陰境第十八卷能觀十乘三千三境生生三無為家家般般圓斷得得諸部第十九卷光明定題事理二定信相位次三種懺法觀心觀佛安養教主定散二善第二十卷通相三觀料揀三土即寂光四土淨穢四外二境見見遣非習氣隨緣八相塵沙法華三大部讀教記目録終妙玄一時教圖時教説時教者聖人之所以開後學也衆生無始背覺合塵吾佛哀而拯之甚間而不亂故寢大施小彈斥淘汰終歸開顯而能事畢矣夫逗機設教莫越乎化儀詮理化物莫越乎化法化法所詮莫越乎真中二理真中二理莫越乎如來藏心此理此心一而二二而一也去佛既遠不有智者正出世之經為人道立教則光明種子或幾乎息矣捨時教無以傳聖人心學者當自時教始五章議夫兩種五章皆果佛之法約教則約如來設教被機之相約行則約佛自行所得之法不作此解何分在纏能詮之名哉然則明佛自行所得之法意令學者聞名識體依體明宗宗成有用起教分別亦若是而已矣是則初心之人便得果佛五章作自己受用而佛世尊只先得我之五章者也問籤五十六言體宗用足者境體也行宗也智用也又云境即是體是法身智行是宗是用何耶曰境智行三對體宗用則宗對般若是智妙用對解脫是行妙取三德義便故若宗是因果以對行妙行始為因行終為果亦便也用是智用化物必智導含識對智妙亦便故知各從其義耳問凡釋首題須立五章何故戒疏但三涅槃二十五耶曰菩薩戒經既行部外又非一經之總目乃是什師誦出一品二卷中偏節戒法一卷別行於世稱菩薩戒經若一經之目應云梵網若一品之目應云心地經品之目須論五章戒本別行節者私安故不用也若涅槃者以順經文説三一圓融一攝一切故也如經云解脫之法亦非涅槃如來之身亦非涅槃摩訶般若亦非涅槃以此而知只是依經文圓詮三德故立二十五章雖諸經義具而無顯文故不立也經體論法華經體唯一實相蓋大雄氏自行究盡化他開顯之法點世相為常住即妄念以成真不順迷情獨取悟理實一部之指歸衆義之都會也然一實相無空假中之異故妙玄通釋標體則曰正指實相別釋顯體則曰即一實相印推原經文則曰諸法實相也唯佛究盡法體本融依正色心莫不全是但此體上具德而有三名當處絶待之謂中當處立法之謂假當處亡泯之謂空故引壽量非如非異雙照如異與二論四句皆顯三諦經曰如是相等三轉讀之即三諦也記主云當知如是相等即是轉釋諸法實相又此三諦以圓融故互具成九故釋籤簡曰空假即中中為經體中即空假亦指於中夫即一而論三圓具而成九故雖作圓具九三説只可作一實相著是知三法乃是體上之具德九法又是三法之圓融皆轉釋一實相之義且非正顯經體正顯經體只一實相云爾又應須知就經體言一切諸法此體收盡而此體外更無一法若有一法在此體外名魔事也妙經玄籤經體之意備求其説惟四明尊者得之言經體則曰心路絶處如彼圓伊當上一點絶思絶議非用非宗也言體德則曰而其性融一不定一如伊一點點不孤然故直法身非法身法身必具般若解脫也言互具則曰彼之四句不出三諦以圓融故三諦各三也若全此一實相經體而起經宗或起經用但名體宗用三義成合矣若全體禮體底體達而起宗本宗要宗助或起本用當用自在用義成離矣又何起修離合之辨哉余故曰經體明即具法相論離合
