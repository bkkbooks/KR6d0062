body:
  text: 天台沙門法照妙玄六教體楞嚴經此方真教體清淨在音聞俱舍論牟尼說法蘊數有八十千彼體語或名是色行蘊攝妙玄八五一用聲為經如佛在世金口演說但有聲音詮辨聽者得道故以聲為經大品云從善知識所聞也二用色為經若佛在世可以聲為經今佛去世紙墨傳持應用色為經大品云從經卷中聞三用法為經內自思惟心與法合不由他教亦非紙墨但心曉悟即法為經故云修我法者證乃自知云云此方用三塵而已餘三識鈍鼻嗅紙墨則無所知身觸經卷亦不能解舌噉文字寧別是非釋籤八二十二然今古共以法為經者文從強說雖別立三法然聲色兩種必假法通若覩若聞不以意思無能令教與心相應妙玄八五若他土亦用六塵亦偏用一塵如淨名曰以一食施於一切於食等者於法亦等於法等者於食亦等此則偏用舌根所對為經或有國土以天衣觸身即得道此偏用觸為經或見佛光明得道此偏用色為經或寂滅無言觀心得道此偏用意為經如衆香土以香為佛事此偏用香為經他方六根識利六塵得為經此土三根識鈍鼻不及驢狗鹿等云何於香味觸等能得通達問根利故於塵是經鈍者塵則非經耶答六塵是法界體自是經非根利取方乃是經籤八二十二次他土中二先總立言亦六亦偏者或一土具六或一土偏一或二三四即如此土具足用三復有增強若單雙具若爾何妨此土根性不等亦有因味及香觸等即如下文通釋者是妙樂一一言文句者文謂文字一部始終故云文即是字為二所依句謂句逗義通長短故云名詮自性句詮差別妙樂一二十有人不許滅後色經唯云名句屬於行蘊若其全不許見經初盡合改聞當知皆先眼耳所得次方流入想行若使一字一聲眼耳二識不俱則名句文皆不成就和合之言不可欺也光明文句上二品是類義此中文句氣類相從節之為跋渠光明記一三此中文句俱在經也以能詮教皆謂四法謂聲名句文此有二種佛世滅後若約佛世八音四辨梵音聲相此一是實名句文身但是聲上屈曲建立此三是假聲屬色法名句文身屬第三聚不相應行毗曇十四成論十七瑜伽二十四種此則大小二宗所立有異名句文者唯識云名詮自性句詮差別文即是字為二所依若約滅後諸聖結集彼土貝葉此土黃卷其中所載名句文者皆依形顯色法建立也今略舉此二具足應四拾遺上七若從經卷名雖因色而其色經本集聲教故從經卷亦云聞名百法鈔未檢補注引文者文身文無自性依字假立若無改轉之義斯乃但名為字若一字已上有所改轉詮得差別即名為句云云文體雖即是字要與二為所依有改轉義方號為文若不與二為所依又無改轉之義但名為字耳教體者一實三假也一實謂色三假謂名句文身此就滅後為言若佛世及彼土此方利鈍互非六塵皆具祖文可覆其三假之相今試明之名詮自性者萬物各有其性如眼耳地水等也句詮差別者如眼詮佛眼肉眼等也文即是字者一字多字以成其文非此無以詮表也又謂之名身等者以聚為義如五陰聚集以成其身而名有種種句有種種文有一多皆是聚集之義故也或問記云文謂文字一部始終且一部之文為眼所覩此正屬色色即是實此與文即是字同異云何曰只一文字之言通乎二向若從體說名為一實若就體上論其功用乃有改轉此字既得名之為文然後復為名句作其所依即屬假也又問何分當體所依曰一實三假當體也所依者有佛世滅後不同佛世以黃金口業為所依滅後未結集時以阿難想行為所依結集之後彼土貝多此土黃卷為所依也又問教體與經體及所聞法體同異云何曰教體屬能詮經體屬所詮法體兼能所也又問大小兩宗竝是一實三假和合得為教體若爾於聲色可作此說其香味觸等但有一實如何是三假相耶曰對根曰實入識曰假以入識分別故六塵皆可三假說也看翻譯名義大小乘印妙玄八十二釋論云諸小乘經若有無常無我涅槃三印印之即是佛說修之得道無三法印即是魔說大乘經但有一法印謂諸法實相名了義經能得大道若無實相印是魔所說故身子云世尊說實道波旬無此事何故小三大一小乘明生死與涅槃異生死以無常為初印無我為後印二印印說生死涅槃但用一寂滅印是故須三大乘生死即涅槃涅槃即生死不二不異淨名曰一切衆生常寂滅相即大涅槃又云本自不生今則無滅本不生者則非無常無我相今則無滅者則非小寂滅相唯是一實相實相故言常寂滅相即大涅槃但用一印也此大小印印半滿經外道不能雜天魔不能破如世文符得印可信當知諸經畢定須得實相之印乃得名為了義大乘也釋籤八草六若有無常至三法印者大論第二十云一切法無常一切法無我涅槃寂滅問寂滅中何以但說一不說多答初印中說五衆第二印中說一切皆無我第三印是果故名寂滅若說無常破外五欲之我所也若說無我破於內我我我所破故是寂滅涅槃行者觀於無常便生厭離既厭苦已存著能觀故有第二無我觀也推求能觀至不可得是一切法無所依止但歸寂滅以是義故說寂滅印也問摩訶衍中諸法不生一相無相此中云何說一切法無我無常名為法印二法云何而不相違答觀無常即是觀空因緣猶如觀色念念無常即知為空過去色壞故不可見故無色相未來色不生無作無用不可見故故無色相現在無住故不可見不可分別故無色相無色相故是空無生滅無生滅及以生滅其實是一說有廣略耳問摩訶衍中說一實相聲聞法中亦應說於一實相法答聲聞法中三種法印廣說四種略說一種無常即是苦諦集諦無我即是道諦寂滅涅槃即是滅諦是故衍中唯說諸法不生不滅一相無相無相即是寂滅涅槃論云衍中明法印者是法華前共部所說小乘法印數復不同故須料簡若此經中獨明實相為一法印故須料簡或問大乘一印小乘三印以何義分曰小衍衍通三教圓教為正以實相印名名通義別今經一印於此復別有云通約通別通圓別約證道同圓有云小乘三藏諸經俱名小諸大乘經通該三教俱名大而取諸大乘經部中尊極就圓而論故說一印者非二空妙玄八二十三文句八三十二妙樂九五止觀五四十別行玄記上十五如類集節一切諸法不出名之與實若直執名實之境故名生法二有若別執名實之境屬自生等故名性相二有若直破所執生法之境名生法二空若於生法之境別破能執四性情計名性相二空舉要言之所執法體是同能空觀法是同所顯理性亦是同但破直執生法之情名生法空破生法境上計四性等執名性相空然此異者蓋佛世宜聞生法空作生法說如光明等宜聞性相空作性相說如涅槃等也問如來赴機明兩二空名義不同法智何云觀性相二空破生法二執顯真俗二諦則成觀性相而破生法耶曰一家觀法非法智不明今委陳之蓋佛世隨機各說滅後入道備推也何者良由佛世根利赴機宜樂隨說一種即便悟入不假備論佛滅度後機緣既鈍直聞生法略聞性相不能悟入是故龍樹造中觀論於生於法廣推性相令悟空寂如論云佛滅度後人根轉鈍深著諸法十二因緣五陰入界為決定相聞大乘法說畢竟空生種種過龍樹為是造此中論則陰界入是生法境於此生法境上推破性相也大師得此意故於妙玄生法文後便引古師性相之說及止觀五四十破見假推性相空後結云此性相中求陰入界不可得即是法空性相中求我人知見不可得名衆生空又破思假推性相空後亦結云四句無欲亦無於四如此觀時即應得入成生法二空六二以至文句釋安樂行名生法空妙樂即以性相而解洎淨名玄光明疏於生法中並推性相光明記云但於假實三毒六緣委破四性類示二空四草五是知四明得龍樹天台荊溪諸文末代入道須推性相而破生法之意故於別行玄記明判云此由大乘觀性相二空破生法二執顯真俗二諦指如大本即妙記九五釋生法空引淨名玄性相為證也問性相二空為局衍門為通小教若局衍門何故輔行三下十一佛令須跋聞常證果即別圓意兼於藏通是故諸教皆離性執故此破性雖在衍門是故四教亦可通用輔行二上二十三但離性相成聲聞通空等耶若通小教何云觀所生心與前不別能觀觀智即空為異何以即空四性推撿略記中下十五既俱無常即破常倒不假更用自他等名故四句推唯在衍門耶曰有通有別通則四教俱用別則唯在衍門以中論觀法斥小故也然雖三藏觀性相空但只成析空觀耳自通已去故曰能觀觀智即空為異例如中道實相之名尚通於小何隔性相二空之名耶問性相為局滅後為通佛世若通何故妙樂八二十七然中論觀法被末代鈍根佛世當機何勞設此耶若局而光明法華涅槃大品皆有性相觀文何耶曰機有利鈍說有廣略中論廣說則局滅後非謂略說亦局也以由佛世機利略說即悟故輔行五下十七云今依中論廣觀之法正被末代之人問四句亦通相空耶且相破能空空但是一云何有四曰性空之觀唯一以破四計故成四句相空亦一隨破四不亦成四句也須知用時唯修一空頓亡性相二四句計但示性相前後說耳故止觀云四句推性不見性是世諦破性亦名性空四句推名不見名是真諦破假亦名相空又云四性撿不得即是性空四句推不得即是相空輔行解云空非前後二諦同時為破性相前後說耳又云言雖前後意不異時四明云說時說行時斯之謂也問生法性相既俱名空合對真諦何故妙樂云真諦即法空俗諦即生空淨名玄世諦破性真諦破相耶曰別圓明生法性相俱通三諦今從二諦法相言之據俗諦法體本無衆生自他等執故云俗諦即生空世諦破性也據真諦亡泯本無五陰無性之執故云真諦即法空真諦破性也又復應知生空對性法空對相且從義便直爾對之若欲委明生法各有性相如云性相中求我人知見不可得即生空等也若爾則真諦即法空了因也俗諦即生空緣因也何故妙玄反云得人空成真諦智𦦨得法空成俗諦智焰耶別行玄云觀人空即是了因種觀法空是緣因種耶曰法相不同隨文對當用與有異不可一準問性相二空散出經論輔行判云諸經論中是例甚衆三下十何故妙樂若不了今家依於智論中論等準理準義立此二空諸無可準耶又準理準義二相云何既等餘經論何云諸無可準曰準理者實相理也準義者修觀義也以經中只一無性之言大師準此實相必無四性無相性故作二空釋又準修觀義才忘情計必能所俱忘故作二空釋而此釋經蓋依二論也故知經中一無性言等文荊溪分明結示修性而為義理請細詳之今家廣明性相專依龍樹祖承性宗乃對相宗以說故云諸無可準非用法相者之所逮也非謂不準諸經論矣問性空自是空觀妙玄七五何對三觀云即假故無自性即空故無他性即中故無共性雙照故無無因性耶曰此以圓融三觀破遍執四性蓋對所破義便亦是總用三觀破四性也問推破性相本是空觀妙宗何故於假觀云諸法諸門破性破相一一對治無不諳練是名識藥耶曰自行化他不同今明菩薩出假用法藥治衆生情執故在假觀也問淨名疏云二乘斷欲見諦得入涅槃此但空有我不能空我所何故輔行六上十二小乘空我所名法空空於我人名衆生空耶曰二乘自說具二空以大斥小則大空涅槃之法小住涅槃故未空法也又文句八三十二生法二忍即生法二空者自釋住忍辱地名生忍又復於法無所行名法忍正以衆生實法明之不可以諸文約情無情為妨問生法之名光明中以衆生五陰而分釋籤以見思兩惑而分妙樂以真俗而分淨名疏以生死涅槃而分輔行以我我所而分別行玄記以緣了二因而分諸文不同者何也曰一從所破二從所顯皆是生法二空也若光明釋籤淨名輔行蓋從所破說若妙記別行乃從所顯說以此收之罄無不盡夫二空之說莫非添削北峰講下所聞若廣智而下諸師云云辨是與非豫病未暇也別教縱橫妙玄九四法身本有般若修成解脫始滿不但果德縱成因亦局限釋籤九十二三德縱橫如止觀第三中文句二三十今明別家因時三法縱橫果時三法亦縱橫妙樂三四約別破中云縱橫者具如止觀第三所引文句九十九若但性德二如來者是橫但修得三如來者是縱先法次報後應亦是縱妙樂九二十七言修縱性橫者非圓妙也性德之名名通別教別教雖有性德之語三皆在性而不互融故成別義若三皆在修前後而得道理成縱具如止觀第三及記止觀三五諸大乘師說法身是正體有佛無佛本自有之非適今也了因般若無纍解脫此二當有隔生跨世彌亘淨穢此字義縱也又言三德無前後一體具足以體從義而有三異蓋乃體橫而義縱耳又言體義俱不殊而有隱顯之異俱不異未免橫隱顯異未免縱輔行三上十一法身是正體等者法身本有是故居初二德當有是故居次於二德中般若必居無纍之前故成縱義云云次師云三德無前後等者初師體唯法身此師體具三德雖具三德義同初師據體具邊復不相冥故成橫義以本有故名為體橫從修德邊名為義縱後師云體義俱不殊等者體之與義俱從本有故云不殊據行證得復似前後故云隱顯法身一德在纏為隱出纏為顯餘之二德種子久居名之為隱究竟果滿名之為顯三德俱有此之二義本有三法俱名為橫俱有隱顯故俱名縱以隱顯故則有先後故成縱也光明記一二十六別教行智理三次第資發修時縱也法報應三果中齊顯證時橫也良由此教本有法身為惑所覆故須別修緣了之功相資顯發復由此教性具三法而不相收致使功成三身橫顯妙玄五三十四雖三點上下而無縱表裏而無橫一不相混三不相離釋籤六二十上下是縱義雖一點在上不同點水之縱三德亦爾雖法身本有不同別教為惑所覆表裏是橫義雖二點居下不同列火之橫三德亦爾雖二德修成不同別人理體具足而不相收妙宗上二十一問三德既是一本覺性由證顯發止是故名為初發心住言縱橫者蓋修縱而性橫不由即也在因在果皆有修性是則因既修縱果亦修縱因既性橫果亦性橫矣且修縱性橫詳妙宗意只為別人不知本覺之性具染惡德是故染惡非二佛性別修緣了顯本法身故成縱也亦為不知本覺之性具染惡德不能全性起染惡修乃成理體橫具三法也因果各縱橫者如光明記智行理三相資顯發此修因縱也如妙玄法身本有般若修成解脫始滿此果縱也亦以此教性中三法互不相收此因橫也法報應三果上齊顯此證果橫也須知別教因之與果所論三法次第即縱義各異即橫義故妙玄五二十五資成在前觀照居次真性在後此三豎別縱非大乘此三並異橫非大乘然既性具三法而文多云別修緣了莊嚴本有何謂也曰性具三法橫義也別修緣了莊嚴法身縱義也不可以縱難橫但諸教文或果云縱或因云橫或因果云縱蓋偏言之耳有云修性各縱橫者非也圓教反是懺重妙玄九十五然小乘戒藏不許懺重修多羅藏使犯重人念佛身佛身者念空也百録一九夫四重五逆佛海死尸依小乘經如斷多羅樹畢竟不生無懺悔處依大乘經聽許洗浣如呪枯生果如死者還生雖有此法要須志心治禪病經宋沮渠京聲譯思字函犯突吉羅乃至波羅夷云云心懷慚愧懺悔諸罪為僧執事作諸苦役掃廁擔糞經八百日云云爾時律師復應以律撿問此人復教誦戒經八百遍然後方與如淨比丘得無有異禪門二五初明作法懺悔者以作善事反惡事故故名懺悔如毗尼中一向用此法滅罪何以故如懺第二篇乃至下三篇並是作法此事易知義如律中廣明但未明懺悔四重法別有最妙初教經出懺悔四重法彼經云當請三十清淨比丘僧於大衆中犯罪比丘當自發露僧為作羯磨成就又於三寶前作諸行法及誦戒千遍即得清淨亦云令取得相為證而說滅罪清淨當知律中雖不出經中有此羯磨明文作法相貌如彼經中廣說業疏四下二十六初懺夷中此根本罪聖道之源既以毀犯一生絶分道猶尚可奈生報何如僧祇中捨此身已來報即墮阿毗脂獄如罪福經隨犯一重則九百二十一億六十千歲與化樂天同壽受苦若洗心歸懺佛教亦開良由衆生信法未久懷毒著妄不思來苦故迷造重後發勝心悔過前失亦令學戒預入僧儔諸律名為學悔沙彌也事鈔中四十六四分云若比丘及尼犯波羅夷已都無覆藏心令如法懺悔母論云與白四悔法已明得法名清淨持戒示復本但此一身不得超生離死顯無勝用然障不入地獄明障來苦問小乘經藏為許懺重不許懺重許則有違百録之文不則又違妙玄禪病及禪門引初教之文於斯二者云何曰準諸文小乘經藏許懺四重若百録文者以二義釋之一通指律藏名之為經如輔行五上一云修多羅之名名該三藏則百録通指律藏名經止觀云若犯事中輕過律中皆有懺法若犯重罪小乘無懺法以此則知小無懺者但是指律爾二大小抑揚不妨指於小經百録意云小乘經藏雖有懺重而觀拙功微重罪難滅不若方等中道呪王滅罪速疾專為四衆除滅重罪令人欽慕勤修大乘故抑小經無於懺悔獨揚大教有滅罪方故云若依大乘聽許洗浣等也又問小乘律藏許懺重不許則妙玄禪門皆謂小無懺重況輔行云小無懺重之說仍成重罪未亡不則何故律中業疏事鈔皆有六聚五篇第一白四羯磨懺夷罪耶曰小乘諸律有懺夷罪而今家諸文云無者以由明懺正為修觀入道所以先懺障道重罪而律藏雖云懺重性罪不滅仍障聖果還同不懺如四明記中說又資持記中四下六問世中皆云小無懺重之文今諸律中云何開懺答律開懺者為同財法及障來報若望體壞無任僧用不復本位猶同不懺故云無耳非謂不許懺也文是知律雖開懺但同學悔沙彌既戒毀壞不任僧用故云無懺重耳若爾開懺何益曰資持記同上問云既不足數開懺何為答若不求懺財法兩亡僧須滅擯由懺淨故得入僧中但不足數又復能除獄報九百二十一億六十千歲地獄之苦頓然清淨豈非益耶有云小乘經藏無懺重者且約事說妙玄諸文許有者約理而論有云經藏許懺者是方等中藏教小乘若荊溪云小無者自說鹿苑小乘也有云小乘無者且約作法若取相無生則通取懺重如光明疏記今總問之且初教經三十僧中羯磨成就復本清淨豈非事耶豈非鹿苑藏耶豈非作法耶有云化制不同經是化教故懺律是制教故不懺今問業疏事鈔引四分僧祇皆化教經耶有云荊溪自云小無懺重南山自依成實乃分通大乘故諸律文明懺重也今問四分成實縱是分通僧祇母論亦分通耶三藏教名釋籤十七他云三藏通大小何為但屬小今明如法華云貪著小乘三藏學者又大論中處處以三藏對衍而辨大小故準此文以三藏為小若通論者小衍二門俱有三藏自是通途非別意也若唯通途如何消通法華大論具如四教本中廣明大論空字函百卷末復次佛在世時無有三藏名但有持修多羅比丘持毗尼比丘持摩多羅迦比丘四教義一一一釋三藏教名者此教明因緣生滅四聖諦理正教小乘傍化菩薩所言三藏教者一修多羅藏二毗尼藏三阿毗曇藏一修多羅藏者云云然多翻云法本出世善法言教之本故云法本即是四阿含經也二毗尼藏者毗尼此翻為滅佛說作無作戒能滅身口之惡是故云滅即八十誦律也三阿毗曇藏者此翻云無比法聖人智慧分別法義也故云無比法若佛自分別法義若佛弟子分別法義皆名阿毗曇也然此三法通名藏者以含藏為義云云阿含即是定藏四阿含多明修行法也毗尼即是戒藏正明因事制戒防止身口之惡法也阿毗曇即是慧藏分別無漏慧法不可比也此之三藏的屬小乘故法華云貪著小乘三藏學者問曰如此對當義理可然而名乖詮次答曰說時非行時起教之次阿含為先修行之初木叉為首云云翻譯名義云俱舍或云比吒或云摘迦此翻為藏問法華既云三藏學者大論何云佛在世時無三藏名答佛滅度後阿難結集修多羅藏優波離結集毗奈耶藏迦葉結集阿毗曇藏是則法華梵本恐無此名多是譯師加三藏名顯小乘教余謂俱舍二字既翻為藏則藏之一字是華言明矣故知凡言修多羅藏等乃滅後譯師以華梵合標也不然豈可佛世有華言耶大論所以云無者此也性相二宗妙玄十三所謂南三北七籤十六南謂南朝即京江之南北謂北朝河北也自宋朝已來三論相承其師非一並稟羅什但年代淹久文疏零落至齊朝已來玄綱殆絶江南盛弘成實河北偏尚毗曇云云近代相傳以天台義指為南宗者非也自是山門一家相承是故難則南北俱破取則南北俱存云云妙玄三二十如此破會深廣莫以中論相比籤四十五如此破會莫以中論相比者依向所說豈比中論末代通經雖兼別含通豈能委明二十一種單復開合適時破會逗物之妙結撮始終耶問一家所承本宗龍樹今此何以反斥本宗答本承觀法不承論所破勢論意唯以四句觀法破大小執令末代行者歸心有由若部意所立功歸於此若論破會者未若法華故權實本迹遺偏廢近久遠聖旨於茲始存故獲陀羅尼由三昧之力師資之宗宛如符契淨名疏六三十一問龍樹學者何以用天親之義答是二大士豈不同入不二法門今本為通佛教隨有所關即用何得定執若分別界外結惑生死及諸行名義當細尋天親若觀門遣蕩安心入道何過龍樹云云若不取地攝相映望者他或謂非義理多端強說埀裕八八荊溪云此問意者由用有後生死等言是攝師義是故且推以屬天親玄義云無著造攝大乘論無著即天親之兄俱是五性宗然法相之盛在乎天親故云天親義也云云同入不二法門者所證妙理一體無殊四悉隨機立宗兩異龍樹承於文殊明一切衆生悉有佛性名一性宗天親承於彌勒說三無二有名五性宗三無者闡提及定性二乘俱無佛性不得作佛二有者不定及菩薩俱有佛性未來成佛故西方此土人到于今有兩宗之異云云一家所用龍樹為宗二宗擅美共顯佛經若分別等者世以天親為法相宗龍樹為法性宗其可知矣龍樹於佛滅後五百年出天親九百年出云云地攝映望者地持論是彌勒所造亦天親所宗也發軫鈔中二性相二宗原出西域那蘭陀寺有二大德一名戒賢一名智光各化五百衆戒賢遠承彌勒無著近踵法護難陀依深密等經瑜伽等論智光遠承文殊龍樹近稟青目青辨依般若等經中觀等論荊溪行業記梁補闕佛滅度後十有三世有龍樹大士始從文字廣第一義嗣其法者號法性宗或問賢首禪宗並宗法性與今何異竹庵曰天台法性為宗談具得旨故四明尊者云只一具字彌顯今宗也荊溪云固蔽理觀深微而以事相釋義言弘斯典者遠矣者乃斥慈恩法華玄贊也又云談法界者未窮斯妙致使惑果事而迷因理者斥賢首也乞乳淨名經上十八阿難白佛言世尊我不堪任詣彼問疾所以者何憶念昔時世尊身小有疾當用牛乳我即持鉢詣大婆羅門家門下立疏五二十五弟子之儀侍省供待事不可虧是故詣門而乞乳也疏一十六大論云阿難是佛得道夜生涅槃明佛成道後過十二年方為給侍疏四十一身子是左面侍者以聲聞衆中名高德重內外敬揖妙玄十十八然方等彈斥教在三藏之後被訶之時應在十二年前何以得知皆追述昔訶驗是前事籤十二十二得果之後即有彈訶彈訶之時復云往昔驗知並在十二年前文句二五阿難四月八日佛成道日生侍佛得二十五年推此佛年五十五阿難年二十五佛時求侍善見毗婆沙律伯字函第五卷問曰是時大德阿難侍佛否答曰侍如來從菩提樹下起二十年中侍佛者皆不專一或時大德那和或大德那耆多或大德彌耆那或大德優伽婆或大德沙伽多或大德須那訶多如是諸大德隨意樂侍而來不樂而去或悉去時大德阿難來侍乞乳緣具如釋籤十十引乳光經云云淨名疏云侍省供待又云過十二年方為給侍二文言弟子服勤執禮如此非般若別為侍者之比或問阿難七歲出家還受具否云受有違二十之律否則央掘經列阿難於十大弟子之末何也淨名第五疏須陀那沙彌八歲論議而得受具未妨阿難
